- name: Set up a Single Router Topology
  hosts: all
  connection: local
  vars:
    cli_image: "{{ lookup('ansible.builtin.env', 'SKUPPER_CLI_IMAGE') | default('quay.io/skupper/cli:v2-dev', true) }}"
  tasks:
    - name: Create Site router-1 on namespace topology-1
      skupper.v2.resource:
        def: |
          apiVersion: skupper.io/v2alpha1
          kind: Site
          metadata:
            name: router-1
        namespace: topology-1
        platform: podman
    - name: Start the topology-1 namespace
      skupper.v2.system:
        action: start
        platform: podman
        namespace: topology-1
        image: "{{ cli_image }}"
